<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Outer sacred circle — guardian boundary -->
  <circle cx="64" cy="64" r="58" fill="#8b5cf6" fill-opacity="0.05" stroke="#8b5cf6" stroke-width="2.5"/>
  <!-- Socket ring — Unix domain socket concept -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#8b5cf6" stroke-width="1.2" stroke-opacity="0.4" stroke-dasharray="6 3"/>
  <!-- Central flame — the always-on daemon process -->
  <path d="M64 28 C64 28 48 52 48 68 C48 78 55 86 64 86 C73 86 80 78 80 68 C80 52 64 28 64 28Z"
        fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2" stroke-linejoin="round"/>
  <!-- Inner flame -->
  <path d="M64 44 C64 44 55 58 55 67 C55 72 59 76 64 76 C69 76 73 72 73 67 C73 58 64 44 64 44Z"
        fill="#8b5cf6" fill-opacity="0.3" stroke="#8b5cf6" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- Core flame point -->
  <path d="M64 56 C64 56 60 63 60 67 C60 69 62 71 64 71 C66 71 68 69 68 67 C68 63 64 56 64 56Z"
        fill="#8b5cf6" fill-opacity="0.6" stroke="none"/>
  <!-- 4 connection nodes — multiple clients connecting -->
  <circle cx="64" cy="16" r="3" fill="#8b5cf6" fill-opacity="0.7"/>
  <circle cx="112" cy="64" r="3" fill="#8b5cf6" fill-opacity="0.7"/>
  <circle cx="64" cy="112" r="3" fill="#8b5cf6" fill-opacity="0.7"/>
  <circle cx="16" cy="64" r="3" fill="#8b5cf6" fill-opacity="0.7"/>
  <!-- Connection lines to socket ring -->
  <line x1="64" y1="19" x2="64" y2="22" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="109" y1="64" x2="106" y2="64" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="64" y1="109" x2="64" y2="106" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="19" y1="64" x2="22" y2="64" stroke="#8b5cf6" stroke-width="1" stroke-opacity="0.5"/>
  <!-- Bindu — single writer point -->
  <circle cx="64" cy="67" r="2" fill="#8b5cf6"/>
</svg>
